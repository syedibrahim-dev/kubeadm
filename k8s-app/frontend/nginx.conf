server {
    listen 8080;
    root  /usr/share/nginx/html;
    index index.html;

    # React SPA routing — send all non-file requests to index.html
    # so that client-side routes like /items/123 work after a hard refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the Go backend service.
    # ┌─ In Kubernetes ─────────────────────────────────────────────────────┐
    # │  The Ingress controller intercepts /api/* BEFORE the request       │
    # │  reaches nginx, routing it directly to the go-backend Service.     │
    # │  This block is therefore a no-op in production K8s.                │
    # └─────────────────────────────────────────────────────────────────────┘
    # ┌─ In docker-compose (local dev) ─────────────────────────────────────┐
    # │  nginx proxies /api/* to the go-backend container by DNS name.     │
    # └─────────────────────────────────────────────────────────────────────┘
    location /api/ {
        proxy_pass         http://go-backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
