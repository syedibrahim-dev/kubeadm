# =============================================================================
# Argo CD Application — GitOps continuous deployment
# Watches the separate kubeadm-gitops repository for manifest changes.
# When the pipeline updates image tags, Argo CD auto-syncs the cluster.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/syedibrahim-dev/kubeadm-gitops.git
    targetRevision: main
    path: k8s-app/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: test-app
  syncPolicy:
    automated:
      prune: true            # delete resources removed from git
      selfHeal: true         # revert manual kubectl edits back to git state
    syncOptions:
      - CreateNamespace=true
