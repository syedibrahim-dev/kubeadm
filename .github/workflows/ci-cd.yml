# ==============================================================================
# CI/CD Pipeline — Security Scans + Build + Push + DefectDojo Integration
#
# Tools:
#   Hadolint   — Dockerfile linting (best practices, security)
#   Trivy      — Container image vulnerability scanning
#   Semgrep    — SAST (Static Application Security Testing)
#   OWASP ZAP  — DAST (Dynamic Application Security Testing)
#   DefectDojo — Centralized security findings dashboard
#
# Triggers: push to main, pull requests to main
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token
#   DEFECTDOJO_URL      — DefectDojo base URL (e.g. http://localhost:8080)
#   DEFECTDOJO_API_KEY  — DefectDojo API v2 key
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/go-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/node-frontend

jobs:
  # ============================================================================
  # JOB 1: Hadolint — Dockerfile Linting
  # Catches bad practices: missing USER, latest tags, unversioned packages, etc.
  # ============================================================================
  hadolint:
    name: Hadolint — Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: k8s-app/backend/Dockerfile
          format: json
          output-file: hadolint-backend.json
          no-fail: true

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: k8s-app/frontend/Dockerfile
          format: json
          output-file: hadolint-frontend.json
          no-fail: true

      - name: Upload Hadolint reports
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-reports
          path: hadolint-*.json

  # ============================================================================
  # JOB 2: Semgrep — SAST (Static Application Security Testing)
  # Scans Go + JavaScript source code for vulnerabilities, secrets, bad patterns.
  # ============================================================================
  semgrep-sast:
    name: Semgrep — SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST on backend (Go)
        run: |
          semgrep scan \
            --config=auto \
            --json \
            --output=semgrep-backend.json \
            k8s-app/backend/ || true

      - name: Run Semgrep SAST on frontend (React)
        run: |
          semgrep scan \
            --config=auto \
            --json \
            --output=semgrep-frontend.json \
            k8s-app/frontend/src/ || true

      - name: Upload Semgrep reports
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: semgrep-*.json

  # ============================================================================
  # JOB 3: Build & Push Docker Images
  # Multi-platform build with Docker Buildx. Pushes to Docker Hub on main only.
  # ============================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [hadolint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Go backend
        uses: docker/build-push-action@v6
        with:
          context: k8s-app/backend
          file: k8s-app/backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push React frontend
        uses: docker/build-push-action@v6
        with:
          context: k8s-app/frontend
          file: k8s-app/frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # JOB 4: Trivy — Container Image Vulnerability Scanning
  # Scans the built images for CVEs, misconfigurations, and exposed secrets.
  # ============================================================================
  trivy-scan:
    name: Trivy — Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image locally for scanning
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:scan k8s-app/backend/

      - name: Trivy scan — Go backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:scan
          format: json
          output: trivy-backend.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Build frontend image locally for scanning
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:scan k8s-app/frontend/

      - name: Trivy scan — React frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:scan
          format: json
          output: trivy-frontend.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-*.json

  # ============================================================================
  # JOB 5: OWASP ZAP — DAST (Dynamic Application Security Testing)
  # Spins up the frontend container, runs ZAP baseline scan against it.
  # ============================================================================
  zap-dast:
    name: OWASP ZAP — DAST Scan
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and run frontend container
        run: |
          docker build -t frontend-dast k8s-app/frontend/
          docker run -d --name frontend-target -p 8080:80 frontend-dast
          sleep 5
          # Verify container is responding
          curl -f http://localhost:8080/ || (docker logs frontend-target && exit 1)

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080/
          cmd_options: "-J zap-report.json"
          allow_issue_writing: false

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            zap-report.json
            zap_scan_report.html

      - name: Stop target container
        if: always()
        run: docker rm -f frontend-target || true

  # ============================================================================
  # JOB 6: Upload all scan results to DefectDojo
  # Aggregates every report into a single DefectDojo product for visualization.
  # ============================================================================
  defectdojo-upload:
    name: Upload to DefectDojo
    runs-on: ubuntu-latest
    needs: [hadolint, semgrep-sast, trivy-scan, zap-dast]
    if: always()
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: reports/

      - name: List collected reports
        run: ls -la reports/

      # ── Upload each report to DefectDojo ──────────────────────────────────
      - name: Upload Hadolint — backend
        if: hashFiles('reports/hadolint-backend.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Hadolint Dockerfile check" \
            -F "file=@reports/hadolint-backend.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Hadolint Backend - ${{ github.sha }}" || true

      - name: Upload Hadolint — frontend
        if: hashFiles('reports/hadolint-frontend.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Hadolint Dockerfile check" \
            -F "file=@reports/hadolint-frontend.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Hadolint Frontend - ${{ github.sha }}" || true

      - name: Upload Semgrep — backend
        if: hashFiles('reports/semgrep-backend.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Semgrep JSON Report" \
            -F "file=@reports/semgrep-backend.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Semgrep Backend SAST - ${{ github.sha }}" || true

      - name: Upload Semgrep — frontend
        if: hashFiles('reports/semgrep-frontend.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Semgrep JSON Report" \
            -F "file=@reports/semgrep-frontend.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Semgrep Frontend SAST - ${{ github.sha }}" || true

      - name: Upload Trivy — backend image
        if: hashFiles('reports/trivy-backend.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Trivy Scan" \
            -F "file=@reports/trivy-backend.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Trivy Backend Image - ${{ github.sha }}" || true

      - name: Upload Trivy — frontend image
        if: hashFiles('reports/trivy-frontend.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Trivy Scan" \
            -F "file=@reports/trivy-frontend.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Trivy Frontend Image - ${{ github.sha }}" || true

      - name: Upload Trivy — K8s manifests
        if: hashFiles('reports/trivy-k8s-config.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=Trivy Scan" \
            -F "file=@reports/trivy-k8s-config.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=Trivy K8s Config - ${{ github.sha }}" || true

      - name: Upload ZAP DAST report
        if: hashFiles('reports/zap-report.json') != ''
        run: |
          curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -F "scan_type=ZAP Scan" \
            -F "file=@reports/zap-report.json" \
            -F "product_name=k8s-app" \
            -F "engagement_name=CI/CD Pipeline" \
            -F "auto_create_context=True" \
            -F "close_old_findings=True" \
            -F "test_title=OWASP ZAP DAST - ${{ github.sha }}" || true

      - name: Summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Type | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hadolint | Dockerfile Lint | backend + frontend Dockerfiles |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | SAST | Go backend + React frontend source |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Image Scan | Backend + frontend container images |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Config Scan | Kubernetes manifests |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP | DAST | Live frontend container |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reports uploaded to DefectDojo product: **k8s-app**" >> $GITHUB_STEP_SUMMARY
